name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Export OpenAPI schema
        run: make openapi-export
      - name: OpenAPI diff gate
        run: make openapi-diff
      - name: Generate typed clients
        run: make clients
      - name: Run tests
        run: pytest
      - name: Drift check
        run: make drift-check
      - name: Hygiene report
        run: make hygiene
      - name: Burn rate gate
        run: make burn-gate
      - name: Forbidden API scan
        run: make forbidden
      - name: Reproducibility bundle
        run: make repro
      - name: Compose health summary
        run: make health
